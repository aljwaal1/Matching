name: Apply import and label fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/fix-report-saving'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-report-saving
          fetch-depth: 0

      - name: Patch labels and Android import memory use
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          main_path = Path('lib/main.dart')
          text = main_path.read_text(encoding='utf-8')

          if 'String get firstStatementLabel' not in text:
              marker = "      : 'مطابقة العملاء والموردين';"
              getters = """      : 'مطابقة العملاء والموردين';

            String get firstStatementLabel => widget.mode == ReconciliationMode.bank
                ? 'دفاتر الشركة'
                : 'كشف حساب الشركة';

            String get secondStatementLabel => widget.mode == ReconciliationMode.bank
                ? 'كشف البنك'
                : 'كشف حساب العميل أو المورد';"""
              if marker not in text:
                  raise SystemExit('Could not locate SetupScreen title marker')
              text = text.replace(marker, getters, 1)

          text = text.replace('withData: true,', 'withData: kIsWeb,', 1)
          text = text.replace(
              "statementLabel: first ? 'الكشف الأول' : 'الكشف الثاني',",
              'statementLabel: first ? firstStatementLabel : secondStatementLabel,',
              1,
          )
          text = text.replace("label: 'كشف الطرف الأول',", 'label: firstStatementLabel,', 1)
          text = text.replace("label: 'كشف الطرف الثاني',", 'label: secondStatementLabel,', 1)
          text = text.replace(
              "reason: 'غير موجودة في الطرف الأول',",
              "reason: widget.mode == ReconciliationMode.bank\n"
              "              ? 'غير موجودة في دفاتر الشركة'\n"
              "              : 'غير موجودة في كشف حساب الشركة',",
              1,
          )

          if 'bytes = null;' not in text:
              marker = '      var mapping = await _askMapping('
              if marker not in text:
                  raise SystemExit('Could not locate mapping marker')
              text = text.replace(
                  marker,
                  '      // حرر بيانات الملف الخام قبل فتح شاشة تعيين الأعمدة لتقليل الذاكرة.\n'
                  '      bytes = null;\n'
                  + marker,
                  1,
              )

          required_main = [
              'String get firstStatementLabel',
              'String get secondStatementLabel',
              'withData: kIsWeb,',
              'statementLabel: first ? firstStatementLabel : secondStatementLabel,',
              'label: firstStatementLabel,',
              'label: secondStatementLabel,',
              'bytes = null;',
          ]
          missing = [item for item in required_main if item not in text]
          if missing:
              raise SystemExit(f'Missing main.dart changes: {missing}')
          main_path.write_text(text, encoding='utf-8')

          export_path = Path('lib/services/export_service.dart')
          export = export_path.read_text(encoding='utf-8')
          replacements = {
              'الطرف الأول': 'كشف حساب الشركة',
              'الطرف الثاني': 'كشف حساب العميل أو المورد',
          }
          for old, new in replacements.items():
              export = export.replace(old, new)
          if 'الطرف الأول' in export or 'الطرف الثاني' in export:
              raise SystemExit('Ambiguous party labels remain in export_service.dart')
          export_path.write_text(export, encoding='utf-8')
          PY

          dart format lib/main.dart lib/services/export_service.dart
          git diff --check
          git diff -- lib/main.dart lib/services/export_service.dart

      - name: Commit patched files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/main.dart lib/services/export_service.dart
          if git diff --cached --quiet; then
            echo "No additional changes were needed."
            exit 0
          fi
          git commit -m "Clarify statement labels and reduce picker memory"
          git push origin HEAD:agent/fix-report-saving
