name: Build Matching APK

on:
  workflow_dispatch:
  push:
    branches:
      - agent/matching-app-foundation
    paths-ignore:
      - 'apk/**'
      - 'DOWNLOAD_APK.md'
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: matching-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform
        run: flutter create --platforms=android --org com.explapp --project-name matching .

      - name: Apply source compatibility fixes
        run: |
          python3 tool/ci_source_fixes.py
          rm -f test/widget_test.dart

      - name: Configure Android app
        run: |
          sed -i 's/applicationId = "com.explapp.matching"/applicationId = "com.explapp.accountmatching"/' android/app/build.gradle.kts
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' android/app/build.gradle.kts
          sed -i 's/android:label="matching"/android:label="مطابقة الحسابات"/' android/app/src/main/AndroidManifest.xml
          grep -q 'applicationId = "com.explapp.accountmatching"' android/app/build.gradle.kts
          grep -q 'minSdk = 23' android/app/build.gradle.kts

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test reconciliation logic
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Validate and copy APK
        run: |
          test -s build/app/outputs/flutter-apk/app-release.apk
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/Matching.apk
          printf '# تحميل التطبيق\n\n[تحميل ملف APK](./apk/Matching.apk)\n' > DOWNLOAD_APK.md
          test -s apk/Matching.apk

      - name: Commit source fixes and APK
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/main.dart lib/services/export_service.dart apk/Matching.apk DOWNLOAD_APK.md
          git diff --cached --quiet || git commit -m "Fix compatibility and build Matching APK"
          git push
