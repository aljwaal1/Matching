name: Build Matching APK

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'apk/**'
      - 'DOWNLOAD_APK.md'
  push:
    branches:
      - agent/matching-app-foundation
    paths-ignore:
      - 'apk/**'
      - 'DOWNLOAD_APK.md'

permissions:
  contents: write

concurrency:
  group: matching-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform
        run: flutter create --platforms=android --org com.explapp --project-name matching .

      - name: Configure Android app
        run: |
          rm -f test/widget_test.dart
          sed -i 's/applicationId = "com.explapp.matching"/applicationId = "com.explapp.accountmatching"/' android/app/build.gradle.kts
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' android/app/build.gradle.kts
          sed -i 's/android:label="matching"/android:label="مطابقة الحسابات"/' android/app/src/main/AndroidManifest.xml
          grep -q 'applicationId = "com.explapp.accountmatching"' android/app/build.gradle.kts
          grep -q 'minSdk = 23' android/app/build.gradle.kts

      - name: Fix CSV line endings parser
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('lib/services/file_import_service.dart')
          text = path.read_text(encoding='utf-8')
          original = text

          text = text.replace(
              "final text = utf8.decode(bytes, allowMalformed: true).replaceAll('\\r\\n', '\\n');",
              "final text = utf8\n"
              "        .decode(bytes, allowMalformed: true)\n"
              "        .replaceAll('\\r\\n', '\\n')\n"
              "        .replaceAll('\\r', '\\n');",
          )
          text = text.replace(
              "      fieldDelimiter: delimiter,\n      shouldParseNumbers: false,",
              "      fieldDelimiter: delimiter,\n      eol: '\\n',\n      shouldParseNumbers: false,",
              1,
          )

          if "eol: '\\n'" not in text:
              raise SystemExit('CSV EOL fix was not applied')

          if text != original:
              path.write_text(text, encoding='utf-8')
          PY
          grep -n -A12 "_readDelimited" lib/services/file_import_service.dart

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test reconciliation logic
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Validate and copy APK
        run: |
          test -s build/app/outputs/flutter-apk/app-release.apk
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/Matching.apk
          printf '# تحميل التطبيق\n\n[تحميل ملف APK](./apk/Matching.apk)\n' > DOWNLOAD_APK.md
          test -s apk/Matching.apk

      - name: Commit source fix and APK
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/services/file_import_service.dart apk/Matching.apk DOWNLOAD_APK.md
          git diff --cached --quiet || git commit -m "Fix CSV parsing and build Matching APK"
          git push
