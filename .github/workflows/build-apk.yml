name: Build Matching APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'apk/**'
      - 'DOWNLOAD_APK.md'
      - 'CI_FAILURE.md'

permissions:
  contents: write

concurrency:
  group: matching-main-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Download Arabic PDF fonts
        run: |
          mkdir -p assets/fonts
          curl --fail --location --retry 3 \
            'https://notofonts.github.io/arabic/fonts/NotoNaskhArabic/hinted/ttf/NotoNaskhArabic-Regular.ttf' \
            --output assets/fonts/NotoNaskhArabic-Regular.ttf
          curl --fail --location --retry 3 \
            'https://notofonts.github.io/arabic/fonts/NotoNaskhArabic/hinted/ttf/NotoNaskhArabic-Bold.ttf' \
            --output assets/fonts/NotoNaskhArabic-Bold.ttf
          test -s assets/fonts/NotoNaskhArabic-Regular.ttf
          test -s assets/fonts/NotoNaskhArabic-Bold.ttf

      - name: Generate Android platform
        run: flutter create --platforms=android --org com.explapp --project-name matching .

      - name: Configure Android
        run: |
          rm -f test/widget_test.dart
          sed -i 's/applicationId = "com.explapp.matching"/applicationId = "com.explapp.accountmatching"/' android/app/build.gradle.kts
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' android/app/build.gradle.kts
          sed -i 's/android:label="matching"/android:label="مطابقة الحسابات"/' android/app/src/main/AndroidManifest.xml

      - name: Get packages
        run: flutter pub get

      - name: Apply bank period setup
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('lib/screens/bank_reconciliation_screen.dart')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              "import 'package:intl/intl.dart';",
              "import 'package:intl/intl.dart' hide TextDirection;",
          )
          text = text.replace(
              "  bool _busy = false;\n",
              "  bool _busy = false;\n  bool _usePreviousReconciliation = false;\n",
              1,
          )
          text = text.replace(
              "                _monthField(),\n                TextField(\n                  controller: _bankController,",
              "                _monthField(),\n                Card(\n                  margin: EdgeInsets.zero,\n                  child: Padding(\n                    padding: const EdgeInsets.symmetric(vertical: 6),\n                    child: Column(\n                      crossAxisAlignment: CrossAxisAlignment.stretch,\n                      children: [\n                        const Padding(\n                          padding: EdgeInsets.fromLTRB(12, 8, 12, 4),\n                          child: Text(\n                            'هل تريد الاعتماد على تسوية سابقة؟',\n                            style: TextStyle(fontWeight: FontWeight.bold),\n                          ),\n                        ),\n                        RadioListTile<bool>(\n                          value: false,\n                          groupValue: _usePreviousReconciliation,\n                          title: const Text('لا، ابدأ تسوية جديدة'),\n                          subtitle: const Text('لن يتم استدعاء أي بنود من الأشهر السابقة.'),\n                          onChanged: (value) => setState(\n                            () => _usePreviousReconciliation = value ?? false,\n                          ),\n                        ),\n                        RadioListTile<bool>(\n                          value: true,\n                          groupValue: _usePreviousReconciliation,\n                          title: const Text('نعم، اعتمد على آخر تسوية سابقة'),\n                          subtitle: const Text('سيتم استدعاء البنود غير المسوّاة لنفس الحساب دون تكرار.'),\n                          onChanged: (value) => setState(\n                            () => _usePreviousReconciliation = value ?? false,\n                          ),\n                        ),\n                      ],\n                    ),\n                  ),\n                ),\n                TextField(\n                  controller: _bankController,",
              1,
          )
          text = text.replace(
              "  void _calculate() {",
              "  Future<void> _calculate() async {",
              1,
          )
          text = text.replace(
              "    setState(() {\n      _statement = _service.build(",
              "    final previousPending = _usePreviousReconciliation\n        ? await _archive.pendingFromPrevious(\n            accountName: account,\n            beforePeriod: _period,\n          )\n        : const <BankAdjustmentItem>[];\n    if (!mounted) return;\n    setState(() {\n      _statement = _service.build(",
              1,
          )
          text = text.replace(
              "        matchingResult: widget.result,\n      );",
              "        matchingResult: widget.result,\n        previousPending: previousPending,\n      );",
              1,
          )
          path.write_text(text, encoding='utf-8')
          PY

      - name: Analyze
        shell: bash
        run: |
          set -o pipefail
          flutter analyze --no-fatal-infos --no-fatal-warnings 2>&1 | tee analyze.log

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          flutter test --reporter expanded 2>&1 | tee test.log

      - name: Build release APK
        shell: bash
        run: |
          set -o pipefail
          flutter build apk --release --no-tree-shake-icons 2>&1 | tee build.log

      - name: Publish failure details
        if: failure()
        shell: bash
        run: |
          {
            echo '# فشل بناء تطبيق Matching'
            echo
            echo "Commit: $GITHUB_SHA"
            echo
            for file in analyze.log test.log build.log; do
              if [ -f "$file" ]; then
                echo "## $file"
                echo '```text'
                tail -n 180 "$file"
                echo '```'
                echo
              fi
            done
          } > CI_FAILURE.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CI_FAILURE.md
          git diff --cached --quiet || git commit -m "CI: record Matching build failure"
          git push

      - name: Publish APK
        if: success()
        run: |
          test -s build/app/outputs/flutter-apk/app-release.apk
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/Matching.apk
          printf '# تحميل تطبيق مطابقة الحسابات\n\n[تحميل ملف APK](./apk/Matching.apk)\n' > DOWNLOAD_APK.md
          rm -f CI_FAILURE.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/screens/bank_reconciliation_screen.dart apk/Matching.apk DOWNLOAD_APK.md
          git add -u CI_FAILURE.md 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Build Matching APK"
          git push
