name: Repair Picker Extension

on:
  push:
    branches:
      - agent/matching-app-foundation
    paths:
      - .github/workflows/fix-picker-extension.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/matching-app-foundation
      - name: Patch workflow source
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/build-apk.yml')
          text = path.read_text(encoding='utf-8')
          old = """      final extension = file.extension?.toLowerCase() ??
          (file.name.contains('.') ? file.name.split('.').last.toLowerCase() : '');"""
          new = """      final extension = file.name.contains('.')
          ? file.name.split('.').last.toLowerCase()
          : '';"""
          if old not in text:
              raise SystemExit('Picker extension block not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          rm .github/workflows/fix-picker-extension.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/build-apk.yml .github/workflows/fix-picker-extension.yml
          git commit -m "fix: derive selected file extension from filename"
          git push origin HEAD:agent/matching-app-foundation
