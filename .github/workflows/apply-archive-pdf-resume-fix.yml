name: Apply archive PDF resume fix

on:
  push:
    branches:
      - agent/fix-archive-pdf-resume

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/fix-archive-pdf-resume
          fetch-depth: 0

      - name: Apply guarded fix
        run: python .github/scripts/apply_archive_pdf_resume_fix.py

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix archived PDF export and restore interrupted screen"
            git push origin HEAD:agent/fix-archive-pdf-resume
          fi
