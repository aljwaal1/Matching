name: matching
description: تطبيق عربي لمطابقة كشوفات العملاء والموردين والبنوك
publish_to: 'none'
version: 1.2.3+8

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^10.2.0
  excel: ^4.0.6
  archive: ^3.6.1
  xml: ^6.5.0
  csv: ^6.0.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  share_plus: ^11.0.0
  pdf: ^3.11.3
  syncfusion_flutter_pdf: ^30.1.41
  google_mobile_ads: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/NotoNaskhArabic-Regular.ttf
    - assets/fonts/NotoNaskhArabic-Bold.ttf
  fonts:
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoNaskhArabic-Bold.ttf
          weight: 700
