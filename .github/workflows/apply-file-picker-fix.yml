name: Apply legacy file picker fix

on:
  push:
    branches:
      - agent/matching-app-foundation
    paths:
      - .github/workflows/apply-file-picker-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/matching-app-foundation
      - name: Patch file picker source
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('lib/main.dart')
          text = path.read_text(encoding='utf-8')

          if "import 'dart:io';" not in text:
              text = "import 'dart:io';\nimport 'dart:typed_data';\n\n" + text

          pattern = re.compile(r"  Future<void> _pickFile\(bool first\) async \{.*?\n  \}\n\n  void _startMatching", re.S)
          replacement = r'''  Future<void> _pickFile(bool first) async {
    setState(() => _busy = true);
    try {
      final result = await FilePicker.platform.pickFiles(
        type: FileType.custom,
        allowedExtensions: const ['xlsx', 'xls', 'csv', 'tsv', 'txt', 'pdf'],
        withData: false,
        withReadStream: true,
        allowMultiple: false,
      );
      if (result == null || result.files.isEmpty) return;

      final file = result.files.single;
      Uint8List? bytes = file.bytes;

      if ((bytes == null || bytes.isEmpty) && file.path != null) {
        final localFile = File(file.path!);
        if (await localFile.exists()) {
          bytes = await localFile.readAsBytes();
        }
      }

      if ((bytes == null || bytes.isEmpty) && file.readStream != null) {
        final chunks = <int>[];
        await for (final chunk in file.readStream!) {
          chunks.addAll(chunk);
        }
        bytes = Uint8List.fromList(chunks);
      }

      if (bytes == null || bytes.isEmpty) {
        throw const FormatException(
          'تم اختيار الملف، لكن تعذر الحصول على محتواه من مدير الملفات. انقل الملف إلى مجلد التنزيلات ثم حاول مجدداً.',
        );
      }

      final imported = _importer.importBytes(fileName: file.name, bytes: bytes);
      if (!mounted) return;
      setState(() => first ? _first = imported : _second = imported);

      final skipped = imported.skippedRows.isEmpty
          ? ''
          : ' وتم تجاهل ${imported.skippedRows.length} صف غير صالح';
      _message('تم تحميل ${file.name} واستيراد ${imported.records.length} عملية$skipped.');
    } on FormatException catch (error) {
      if (mounted) _message(error.message.toString());
    } catch (error) {
      if (mounted) {
        _message('تعذر تحميل الملف: ${error.runtimeType}. حاول نقله إلى مجلد التنزيلات وإعادة اختياره.');
      }
    } finally {
      if (mounted) setState(() => _busy = false);
    }
  }

  void _startMatching'''

          updated, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit('File picker method was not patched')
          path.write_text(updated, encoding='utf-8')
          PY

          grep -q "withReadStream: true" lib/main.dart
          grep -q "import 'dart:io';" lib/main.dart
      - name: Remove temporary workflow and commit source fix
        run: |
          rm .github/workflows/apply-file-picker-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/main.dart .github/workflows/apply-file-picker-fix.yml
          git commit -m "fix: load selected files on legacy Android devices"
          git push origin HEAD:agent/matching-app-foundation
