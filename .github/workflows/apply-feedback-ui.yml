name: Apply professional feedback UI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/fix-report-saving' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-report-saving
          fetch-depth: 0
          show-progress: false

      - name: Apply feedback UI patch
        run: python3 .github/scripts/apply_feedback_ui.py

      - name: Commit patched files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/main.dart lib/screens/bank_reconciliation_screen.dart
          git diff --cached --check
          git commit -m "Improve support and operation feedback"
          git push origin HEAD:agent/fix-report-saving
