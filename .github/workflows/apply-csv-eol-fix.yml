name: Apply CSV EOL Fix

on:
  push:
    branches:
      - agent/matching-app-foundation
    paths:
      - .github/workflows/apply-csv-eol-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/matching-app-foundation

      - name: Patch CSV parser
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('lib/services/file_import_service.dart')
          text = path.read_text(encoding='utf-8')

          text = text.replace(
              "final text = utf8.decode(bytes, allowMalformed: true).replaceAll('\\r\\n', '\\n');",
              "final text = utf8\n"
              "        .decode(bytes, allowMalformed: true)\n"
              "        .replaceAll('\\r\\n', '\\n')\n"
              "        .replaceAll('\\r', '\\n');",
          )
          text = text.replace(
              "      fieldDelimiter: delimiter,\n      shouldParseNumbers: false,",
              "      fieldDelimiter: delimiter,\n      eol: '\\n',\n      shouldParseNumbers: false,",
              1,
          )

          if "eol: '\\n'" not in text:
              raise SystemExit('CSV EOL fix was not applied')

          path.write_text(text, encoding='utf-8')
          PY

          grep -n -A12 "_readDelimited" lib/services/file_import_service.dart

      - name: Commit parser fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/services/file_import_service.dart
          git commit -m "fix: parse CSV files with LF and CR line endings"
          git push origin HEAD:agent/matching-app-foundation
